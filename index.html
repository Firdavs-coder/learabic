<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arabic Reading Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="top">
      <h1>Arabic Reading Lessons</h1> <br>
    </header>

    <div class="layout">
      <aside class="left-panel">
        <section class="controls">
          <div class="field-group">
            <span class="field-label">Lesson</span>
            <div class="custom-select" id="lessonSelectCustom">
              <button id="lessonSelectBtn" class="select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="lessonSelectValue">Select lesson</span>
                <svg class="icon select-arrow" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6" /></svg>
              </button>
              <ul id="lessonSelectMenu" class="select-menu" role="listbox" aria-label="Lesson list"></ul>
            </div>
          </div>

          <div class="nav-row">
            <button id="prevBtn" class="btn" type="button">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" /></svg>
              <span>Previous</span>
            </button>
            <button id="nextBtn" class="btn" type="button">
              <span>Next</span>
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6" /></svg>
            </button>
          </div>
          <button id="shuffleBtn" class="btn" type="button">Shuffle words</button>

          <div class="field-group">
            <label class="field-label" for="arabicSize">
              Arabic text size <span id="arabicSizeValue">32px</span>
            </label>
            <input id="arabicSize" class="size-slider" type="range" min="24" max="40" step="1" value="32" aria-label="Arabic text size">
          </div>

          <label class="toggle custom-check">
            <input type="checkbox" id="showLatin" checked>
            <span class="check-ui" aria-hidden="true"></span>
            Show Latin reading
          </label>
        </section>
      </aside>

      <section class="content-panel">
        <section id="wordGrid" class="word-grid" aria-live="polite"></section>
      </section>
    </div>
  </main>

  <div id="wordModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalArabic">
      <button id="modalCloseBtn" class="modal-close" type="button" aria-label="Close">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12" /></svg>
      </button>
      <div id="modalArabic" class="modal-arabic"></div>
      <div class="modal-actions">
        <button id="modalSpeakBtn" class="modal-speak" type="button" aria-label="Play Arabic pronunciation" title="Play pronunciation">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5L6 9H3v6h3l5 4V5zM15 9.5a4 4 0 010 5m2.5-7.5a7 7 0 010 10" /></svg>
        </button>
      </div>
      <div id="modalLatin" class="modal-latin"></div>
      <div id="modalMeaning" class="modal-meaning"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
